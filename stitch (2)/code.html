<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13c8ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Lexend', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="mx-auto w-full max-w-[960px] flex flex-1 flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 py-4 lg:px-10">
<div class="flex items-center gap-4">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">translate</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Học Tiếng Trung</h2>
</div>
<div class="flex flex-1 justify-end gap-4">
<div class="flex gap-2">
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-primary/10 text-slate-900 dark:text-slate-100 transition-colors hover:bg-primary/20">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-primary/10 text-slate-900 dark:text-slate-100 transition-colors hover:bg-primary/20">
<span class="material-symbols-outlined">history</span>
</button>
</div>
<div class="aspect-square rounded-full size-10 bg-primary/20 flex items-center justify-center overflow-hidden border border-primary/30">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Avatar of a student learning Chinese" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxImQuRFeP_LnwYm5K75qevjCHy9H1shIOEx-yLxm87daTSMRPkY6H_MtROnIm5xBglN9fk1dqgzMC-oA1_CbfQRjBxH9o_DFgQyIH0SgYi61n2vV7LRtv64OVe35zrGshsggTK1b0ORfZSRvnUkYHD3akxa6b_wzzTZDGRLVF_E6IBEz4kvMkPGuJcYx8UHvyPkNm0FBrGMi_mXL1zazcQhFM6ZRXDbjn3aJj4SLW0OugGR-j6vBxDR0HDGhwOvlXTisltlHTWEk"/>
</div>
</div>
</header>
<!-- Mode Selector -->
<div class="px-6 py-6 lg:px-10">
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-primary/5 p-1 border border-primary/10 shadow-sm">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 text-slate-500 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-800 has-[:checked]:shadow-sm has-[:checked]:text-primary text-sm font-semibold transition-all">
<span class="truncate">Learn</span>
<input checked="" class="hidden" name="mode-selector" type="radio" value="Learn"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 text-slate-500 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-800 has-[:checked]:shadow-sm has-[:checked]:text-primary text-sm font-semibold transition-all">
<span class="truncate">Review</span>
<input class="hidden" name="mode-selector" type="radio" value="Review"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 text-slate-500 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-800 has-[:checked]:shadow-sm has-[:checked]:text-primary text-sm font-semibold transition-all">
<span class="truncate">Hard</span>
<input class="hidden" name="mode-selector" type="radio" value="Hard"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 text-slate-500 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-800 has-[:checked]:shadow-sm has-[:checked]:text-primary text-sm font-semibold transition-all">
<span class="truncate">Random</span>
<input class="hidden" name="mode-selector" type="radio" value="Random"/>
</label>
</div>
</div>
<!-- Main Study Deck Area -->
<main class="flex-1 flex flex-col items-center justify-center px-6 py-4 lg:px-10 gap-8">
<!-- Central Flashcard -->
<div class="w-full max-w-md aspect-[3/4] flex flex-col items-center justify-center rounded-2xl bg-white dark:bg-slate-800 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.2)] border border-primary/5 relative overflow-hidden group">
<!-- Subtle background pattern/gradient -->
<div class="absolute inset-0 opacity-5 pointer-events-none bg-gradient-to-br from-primary to-transparent" data-alt="Abstract soft blue gradient pattern"></div>
<div class="z-10 flex flex-col items-center text-center px-8">
<span class="text-slate-400 text-sm font-medium mb-4 tracking-widest uppercase">Translate this character</span>
<h1 class="text-8xl lg:text-9xl font-bold text-slate-900 dark:text-white mb-8">你好</h1>
<!-- Flip Action -->
<button class="flex items-center gap-2 px-6 py-3 rounded-xl bg-primary text-slate-900 font-bold shadow-lg shadow-primary/30 hover:shadow-primary/40 transition-all active:scale-95">
<span class="material-symbols-outlined">flip_to_back</span>
                            Flip Card
                        </button>
</div>
<!-- Hint area (visible on hover/active) -->
<div class="absolute bottom-6 left-0 right-0 flex justify-center opacity-40">
<p class="text-xs text-slate-400">Tap or click to reveal pinyin and meaning</p>
</div>
</div>
<!-- Learning Controls -->
<div class="w-full max-w-md flex items-center justify-between gap-6 pb-8">
<button class="flex flex-1 flex-col items-center gap-2 group">
<div class="w-full h-14 flex items-center justify-center rounded-xl bg-red-100 dark:bg-red-900/20 text-red-500 border border-red-200 dark:border-red-900/30 transition-all group-hover:-translate-x-1 group-active:scale-95 shadow-sm">
<span class="material-symbols-outlined text-3xl">close</span>
</div>
<span class="text-xs font-bold text-red-500 uppercase tracking-wider">Hard</span>
</button>
<button class="flex flex-1 flex-col items-center gap-2 group">
<div class="w-full h-14 flex items-center justify-center rounded-xl bg-green-100 dark:bg-green-900/20 text-green-500 border border-green-200 dark:border-green-900/30 transition-all group-hover:translate-x-1 group-active:scale-95 shadow-sm">
<span class="material-symbols-outlined text-3xl">check</span>
</div>
<span class="text-xs font-bold text-green-500 uppercase tracking-wider">Easy</span>
</button>
</div>
</main>
<!-- Progress Bar Footer -->
<footer class="px-6 py-6 lg:px-10 border-t border-primary/5">
<div class="flex flex-col gap-3 max-w-md mx-auto">
<div class="flex justify-between items-center">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Daily Goal Progress</p>
<p class="text-primary text-sm font-bold">13/20 cards</p>
</div>
<div class="relative h-2.5 w-full bg-primary/10 rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-primary rounded-full transition-all duration-500 shadow-[0_0_8px_rgba(19,200,236,0.4)]" style="width: 65%;"></div>
</div>
</div>
</footer>
</div>
</div>
</div>
</body></html>
