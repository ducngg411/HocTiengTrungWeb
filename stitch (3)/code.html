<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Deck - Hoc Tieng Trung</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13c8ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Header Component -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 py-4 lg:px-40 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary text-white">
<span class="material-symbols-outlined">style</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Create New Deck</h2>
</div>
<button class="flex size-10 cursor-pointer items-center justify-center overflow-hidden rounded-xl bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<main class="flex flex-1 justify-center py-8 px-4 lg:px-0">
<div class="layout-content-container flex flex-col max-w-[640px] flex-1 gap-8">
<!-- Title Section -->
<div class="flex flex-col gap-2 px-4">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight">Build your deck</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Enter details to start learning Chinese with your custom vocabulary.</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-6 bg-white dark:bg-slate-900 p-6 rounded-xl shadow-sm border border-primary/5">
<!-- Deck Name Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">Deck Name</label>
<input class="form-input flex w-full rounded-lg border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 text-base transition-all" placeholder="e.g. HSK 1 Core Vocabulary" type="text"/>
</div>
<!-- Description Textarea -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">Description</label>
<textarea class="form-input flex w-full rounded-lg border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary min-h-24 p-4 text-base transition-all" placeholder="What topics or level does this deck cover?"></textarea>
</div>
<!-- Source Type Selector -->
<div class="flex flex-col gap-3">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">Source Type</label>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 p-3 rounded-lg border-2 border-primary bg-primary/5 text-primary font-medium">
<span class="material-symbols-outlined text-xl">table_chart</span>
<span>Google Sheets</span>
</button>
<button class="flex items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-xl">edit_note</span>
<span>Manual Entry</span>
</button>
</div>
</div>
<!-- Google Sheets Link Input -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">Google Sheets Link</label>
<a class="text-primary text-xs font-medium hover:underline" href="#">How to share?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">link</span>
<input class="form-input flex w-full rounded-lg border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 pl-10 pr-4 text-base transition-all" placeholder="https://docs.google.com/spreadsheets/d/..." type="url"/>
</div>
<p class="text-slate-400 text-xs mt-1 italic">Make sure the link is set to "Anyone with the link can view".</p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 px-4 pb-10">
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 bg-primary text-white font-bold text-lg shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all">
                            Create Deck
                        </button>
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-12 bg-transparent text-slate-500 font-medium hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
                            Cancel and Return
                        </button>
</div>
<!-- Tips Section -->
<div class="mx-4 p-4 rounded-xl bg-primary/5 border border-primary/10 flex gap-4">
<span class="material-symbols-outlined text-primary">lightbulb</span>
<div class="flex flex-col gap-1">
<p class="text-sm font-bold text-slate-900 dark:text-slate-100 leading-none">Pro Tip</p>
<p class="text-xs text-slate-600 dark:text-slate-400">Use three columns in your sheet: <span class="font-mono bg-white/50 dark:bg-black/20 px-1 rounded text-primary">Hanzi</span>, <span class="font-mono bg-white/50 dark:bg-black/20 px-1 rounded text-primary">Pinyin</span>, and <span class="font-mono bg-white/50 dark:bg-black/20 px-1 rounded text-primary">Meaning</span>.</p>
</div>
</div>
</div>
</main>
</div>
</div>
</body></html>
